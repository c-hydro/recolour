  - conda-forge

dependencies:
  - python=3.11
  - numpy
  - scipy
  - matplotlib
  - pandas
  - xarray
  - dask
  - bottleneck
  - cython
  - "setuptools<81"
  - wheel
  - pip

  - gdal
  - rasterio
  - cartopy
  - h5py
  - netcdf4

  - eccodes
